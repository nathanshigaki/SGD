services:
  db:
    image: postgres:16-alpine
    container_name: sgd-postgres
    restart: always
    environment:
      POSTGRES_DB: sgd_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: